name: Deploy to MonsterASP.NET

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish PmesCSharp.csproj -c Release -o ./publish

      - name: Put app offline
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site66006.siteasp.net
          username: site66006
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: wwwroot/
          dangerous-clean-slate: false
          exclude: |
            **
            !app_offline.htm

      - name: Wait for app to stop
        run: Start-Sleep -Seconds 8

      - name: Deploy files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site66006.siteasp.net
          username: site66006
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: wwwroot/
          dangerous-clean-slate: false
          exclude: |
            **/logs/**
            **/wwwroot/images/**
            **/appsettings.json
            **/app_offline.htm
