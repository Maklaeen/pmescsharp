name: Deploy to MonsterASP.NET

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish PmesCSharp.csproj -c Release -o ./publish

      - name: Create app_offline.htm
        run: echo "<h1>Updating...</h1>" > ./publish/app_offline.htm

      - name: Upload app_offline.htm to stop app
        run: |
          curl --ftp-create-dirs -T ./publish/app_offline.htm "ftp://site66006.siteasp.net/wwwroot/app_offline.htm" --user "site66006:${{ secrets.FTP_PASSWORD }}"

      - name: Wait for app to stop
        run: Start-Sleep -Seconds 20

      - name: Deploy all files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site66006.siteasp.net
          username: site66006
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: wwwroot/
          dangerous-clean-slate: false
          exclude: |
            **/logs/**
            **/wwwroot/images/**
            **/appsettings.json
            **/appsettings.Production.json
            **/app_offline.htm

      - name: Remove app_offline.htm to bring app back online
        run: |
          curl -Q "DELE wwwroot/app_offline.htm" "ftp://site66006.siteasp.net/" --user "site66006:${{ secrets.FTP_PASSWORD }}"
